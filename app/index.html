<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Dual Preview</title>
  <link rel="icon" type="image/png" href="../icons/icon48.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <span class="logo">⬜ Dual Browser</span>
  <div class="sep"></div>

  <div id="layout-presets">
    <button class="preset-btn active" data-preset="mobile-desktop" title="Mobile + Desktop">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="6" height="12" rx="1"/>
        <rect x="9" y="1" width="10" height="12" rx="1"/>
      </svg>
    </button>
    <button class="preset-btn" data-preset="mobile-mobile" title="Mobile + Mobile">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="6" height="12" rx="1"/>
        <rect x="9" y="1" width="6" height="12" rx="1"/>
      </svg>
    </button>
    <button class="preset-btn" data-preset="desktop-desktop" title="Desktop + Desktop">
      <svg viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="8" height="12" rx="1"/>
        <rect x="11" y="1" width="8" height="12" rx="1"/>
      </svg>
    </button>
  </div>

  <div style="position:relative">
    <button id="add-panel-btn" title="Dodaj panel">+</button>
    <div class="dropdown" id="add-dropdown" style="display:none; top:32px; left:0">
      <div class="dropdown-item" data-add="mobile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
        Dodaj widok mobilny
      </div>
      <div class="dropdown-item" data-add="desktop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Dodaj widok desktopowy
      </div>
    </div>
  </div>

  <div class="spacer"></div>

  <div id="sync-wrap">
    <span>Sync</span>
    <label class="toggle-sw">
      <input type="checkbox" id="sync-toggle">
      <span class="knob"></span>
    </label>
  </div>

  <div class="sep"></div>

  <button class="tb-btn" id="screenshot-all-btn" title="Screenshot obu paneli">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Screenshot
  </button>

  <button class="tb-btn" id="share-btn" title="Skopiuj permalink">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Share
  </button>

  <button class="tb-btn" id="theme-btn" title="Zmień motyw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<!-- Panels -->
<div id="panels-wrap"></div>

<!-- QR Modal -->
<div id="qr-modal">
  <div id="qr-box" class="t-modal">
    <strong style="font-size:14px">QR Code</strong>
    <div id="qr-canvas"></div>
    <div id="qr-url"></div>
    <button id="qr-close">Zamknij</button>
  </div>
</div>

<script src="qr.js"></script>
<script src="app.js"></script>
</body>
</html>
