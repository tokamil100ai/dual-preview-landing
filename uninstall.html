    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #000000;
      --secondary:   #333333;
      --tertiary:    #0669FF;
      --neutral:     #FFFFFF;
      --surface-alt: #F6F6F6;
      --muted:       #666666;
      --border:      #E9E9E9;

    html { scroll-behavior: smooth; }

      background: var(--neutral);
      color: var(--secondary);
      font-size: 18px;
      line-height: 30px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 var(--pad-x);
    }

    /* ── NAV ── */
    .nav {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(24px) saturate(180%);

      height: 68px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset, 0 4px 24px rgba(0,0,0,0.04);
    }

    .nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--tertiary);
      color: var(--on-primary);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 0 24px;
      height: 44px;
      border-radius: 22px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s ease;
    }

    .btn-primary:hover { opacity: 0.85; }

    /* ── HERO ── */
    .uninstall-hero {
      padding: 40px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .uninstall-hero-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .uninstall-icon {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .uninstall-hero h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--primary);
      margin-bottom: 2px;
    }

    .uninstall-hero p {
      font-size: 14px;
      line-height: 20px;
      color: var(--muted);
      margin: 0;
    }

    /* ── REINSTALL HINT ── */
    .reinstall-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F6F6F6;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--secondary);
      white-space: nowrap;
    }

    .reinstall-hint a {
      color: var(--tertiary);
      font-weight: 600;
      text-decoration: none;
    }

    .reinstall-hint a:hover { text-decoration: underline; }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 32px;
    }

    /* ── FORM SECTION ── */
    .form-section {
      max-width: 680px;
      margin: 0 auto;
      padding-top: 24px;
      padding-bottom: 64px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .form-section h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .form-section > p {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .form-embed {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface-alt);
    }

    .form-embed iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      background: #FAFAFA;
      padding: 32px 0;
    }

    .footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-copy {
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .footer-link:hover { color: var(--primary); }

    @media (max-width: 600px) {
      :root { --pad-x: 16px; }

      .nav { height: auto; padding: 12px 0; }
      .nav .container { flex-direction: column; align-items: flex-start; gap: 12px; }

      .reinstall-hint { display: none; }

      .btn-primary { font-size: 14px; height: 40px; padding: 0 18px; }

      .form-section { padding-top: 16px; padding-bottom: 40px; }

      .footer .container { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
